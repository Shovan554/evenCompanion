services:
  - type: web
    name: maccompanion-relay
    runtime: node
    plan: free
    region: oregon
    rootDir: relay
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: RELAY_TOKEN
        sync: false
